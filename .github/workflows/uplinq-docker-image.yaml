name: Uplinq Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag. Defaults to sha-<short-sha> for branch builds and the tag name for tag builds."
        required: false
        type: string
      push_latest:
        description: "Also publish ghcr.io/uplinqai/doltgres:latest."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/uplinqai/doltgres
  SMOKE_IMAGE: doltgres-smoke

jobs:
  publish:
    name: Build, Smoke, and Publish
    if: github.repository == 'uplinqai/doltgres'
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: meta
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.image_tag || '' }}
          PUSH_LATEST: ${{ inputs.push_latest || 'false' }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          image_tag="$REQUESTED_TAG"
          if [ -z "$image_tag" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              image_tag="${GITHUB_REF#refs/tags/}"
              image_tag="${image_tag#v}"
            else
              image_tag="sha-${short_sha}"
            fi
          fi

          {
            echo "short_sha=${short_sha}"
            echo "image_tag=${image_tag}"
            echo "smoke_tag=${SMOKE_IMAGE}:${short_sha}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${image_tag}"
            if [ "$image_tag" != "sha-${short_sha}" ]; then
              echo "${IMAGE_NAME}:sha-${short_sha}"
            fi
            if [ "$PUSH_LATEST" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime-source
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.smoke_tag }}
          build-args: |
            DOLTGRES_IMAGE_SOURCE=https://github.com/${{ github.repository }}
            DOLTGRES_IMAGE_REVISION=${{ github.sha }}
            DOLTGRES_IMAGE_VERSION=${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: scripts/smoke_docker_image.sh "${{ steps.meta.outputs.smoke_tag }}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime-source
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            DOLTGRES_IMAGE_SOURCE=https://github.com/${{ github.repository }}
            DOLTGRES_IMAGE_REVISION=${{ github.sha }}
            DOLTGRES_IMAGE_VERSION=${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
